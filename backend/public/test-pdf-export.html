<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 导出测试 - 从数据库加载</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
    <style>
        :root {
            --primary-color: #5DADE2;
            --page-width: 210mm;
            --page-height: 297mm;
            --page-margin-top: 15mm;
            --page-margin-bottom: 15mm;
            --page-margin-sides: 20mm;
            --q-label-fontsize: 11pt;
            --q-content-fontsize: 11pt;
            --q-spacing-between: 8mm;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Times New Roman", Times, serif, "SimSun", "STSong", serif;
            line-height: 1.6;
            color: #333;
            background: #f0f2f5;
            -webkit-print-color-adjust: exact !important;
        }

        /* 打印样式 */
        @media print {
            .no-print, .page-controls { display: none !important; }
            body { background: white !important; }
            
            .printable-page { 
                margin: 0 !important; 
                box-shadow: none !important; 
                border: none !important; 
                page-break-after: always; 
                break-after: page;
                width: var(--page-width) !important;
                min-height: var(--page-height) !important;
                height: auto !important;
                display: flex;
                flex-direction: column;
            }
            
            .printable-page .questions-list {
                flex: 1;
            }
            
            .printable-page .paper-footer {
                margin-top: auto !important;
            }
            
            .printable-page:last-child { 
                page-break-after: auto; 
                break-after: auto;
            }
            
            /* @page 规则通过 JavaScript 动态设置 */
            
            /* 允许题目内容自然流动，只在关键元素处避免分页 */
            .question-item {
                page-break-inside: auto;
                break-inside: auto;
            }
            
            /* 题目头部和题型标题避免与内容分离 */
            .question-header {
                page-break-after: avoid;
                break-after: avoid;
            }
            
            .section-header {
                page-break-after: avoid;
                break-after: avoid;
            }
            
            /* 题目容器 */
            .question-item {
                margin-bottom: var(--q-spacing-between);
            }
            
            /* 题目头部 */
            .question-header {
                font-weight: bold;
            }
            
            /* 解析区域 */
            .question-analysis {
                margin-top: 2mm;
                text-align: left;
            }

            .question-analysis-content {
                text-align: left;
                overflow: visible;
                word-wrap: break-word;
            }

            .question-analysis-content .katex {
                text-align: left;
            }

            .question-analysis-content .katex-display {
                overflow: visible;
                overflow-x: visible;
            }
            
            /* 图片避免被截断 */
            .question-image {
                page-break-inside: avoid;
                break-inside: avoid;
            }
        }

        /* 预览样式 */
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 1000;
            max-width: 350px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .controls h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #333;
        }

        .controls button {
            padding: 8px 16px;
            margin: 5px 0;
            border: none;
            border-radius: 4px;
            background: var(--primary-color);
            color: white;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
        }

        .controls button:hover {
            background: #3498db;
        }

        .controls input, .controls select {
            width: 100%;
            padding: 6px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .controls label {
            font-size: 12px;
            color: #666;
            display: block;
            margin-top: 8px;
        }

        .controls hr {
            margin: 10px 0;
            border: none;
            border-top: 1px solid #eee;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 5px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            font-size: 12px;
            color: #333;
            cursor: pointer;
        }

        .checkbox-item input {
            margin-right: 4px;
        }

        .margin-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
            margin-top: 5px;
        }

        .margin-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .margin-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 2px;
        }

        .margin-item input {
            width: 100%;
            padding: 4px;
            font-size: 11px;
            text-align: center;
        }

        /* 页面样式 */
        .printable-page {
            background: white;
            width: var(--page-width);
            min-height: var(--page-height);
            margin: 20px auto;
            padding: var(--page-margin-top) var(--page-margin-sides) var(--page-margin-bottom);
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
            position: relative;
        }

        .paper-header {
            text-align: center;
            padding-bottom: 5mm;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 5mm;
        }

        .paper-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 3mm;
        }

        .paper-info {
            font-size: 0.85em;
            color: #888;
        }

        .section-header {
            font-size: 1.2em;
            font-weight: bold;
            margin: 5px 0 10px 0;
            padding-bottom: 3px;
            border-bottom: 1px solid #333;
        }

        .questions-list {
            min-height: 200mm;
        }

        .question-item {
            margin-bottom: var(--q-spacing-between);
        }

        .question-analysis {
            margin-top: 2mm;
            text-align: left;
        }

        .question-analysis-content {
            text-align: left;
            overflow: visible;
            word-wrap: break-word;
        }

        .question-analysis-content .katex {
            text-align: left;
        }

        .question-analysis-content .katex-display {
            overflow: visible;
            overflow-x: visible;
        }

        .question-header {
            font-weight: bold;
            font-size: var(--q-label-fontsize);
            margin-bottom: 2mm;
        }

        .question-body {
            font-size: var(--q-content-fontsize);
            line-height: 1.6;
        }

        .question-body p { margin: 0.5em 0; }

        .question-image {
            margin: 10px 0;
        }

        .question-image img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* KaTeX 样式 */
        .katex-display {
            margin: 0.5em 0 !important;
            overflow-x: auto;
        }

        .katex { font-size: 1.1em !important; }

        /* 状态提示 */
        .loading, .error, .empty {
            text-align: center;
            padding: 100px 20px;
            font-size: 16px;
        }

        .loading { color: #666; }
        .error { color: #e74c3c; }
        .empty { color: #999; }

        /* 解析样式 */
        .question-analysis {
            margin-top: 3mm;
            padding: 3mm;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-left: 3px solid #28a745;
            border-radius: 0 4px 4px 0;
            font-size: calc(var(--q-content-fontsize) * 0.95);
            line-height: 1.7;
        }
        .question-analysis-header {
            font-weight: bold;
            color: #28a745;
            margin-bottom: 2mm;
        }
        .question-analysis-content { color: #495057; }
        .question-analysis-content p { margin: 0.3em 0; }
        .question-analysis-content h3 { 
            color: #007bff; 
            font-size: 1em; 
            margin: 0.5em 0 0.3em;
        }
        .question-analysis-content code {
            background: #e9ecef;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 0.9em;
            color: #c7254e;
        }
    </style>
</head>
<body>
    <div class="controls no-print">
        <h3>PDF 导出设置</h3>
        
        <div id="manualInputSection">
            <label>试卷 Token:</label>
            <input type="text" id="paperToken" value="">
            <button onclick="loadPaper()">加载试卷</button>
            <hr>
        </div>
        
        <div id="encryptedLinkInfo" style="display:none;">
            <div style="background:#e8f5e9;padding:10px;border-radius:4px;margin-bottom:10px;">
                <strong>安全打印链接</strong><br>
                <span style="font-size:12px;color:#666;">来自智能组卷系统</span>
            </div>
        </div>
        
        <label>题目显示方式:</label>
        <select id="questionDisplayMode">
            <option value="text">仅题目文本</option>
            <option value="auto">自动选择（优先题图）</option>
            <option value="image">仅题图</option>
        </select>
        
        <label>显示选项:</label>
        <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" id="showSource" checked> 显示来源</label>
            <label class="checkbox-item"><input type="checkbox" id="showId"> 显示ID</label>
            <label class="checkbox-item" id="showAnalysisLabel" style="display:none;"><input type="checkbox" id="showAnalysis"> 显示解析</label>
        </div>
        
        <hr>
        
        <label>每页题目数 (0=自动分页):</label>
        <input type="number" id="questionsPerPage" value="0" min="0">
        
        <label>题目间距 (mm):</label>
        <input type="number" id="spacing" value="8" min="0">
        
        <label>字体大小 (pt):</label>
        <input type="number" id="fontSize" value="11" min="8" max="16">
        
        <hr>
        
        <label>页边距设置 (mm):</label>
        <div class="margin-inputs">
            <div class="margin-item">
                <span class="margin-label">上</span>
                <input type="number" id="marginTop" value="15" min="0" max="50">
            </div>
            <div class="margin-item">
                <span class="margin-label">下</span>
                <input type="number" id="marginBottom" value="15" min="0" max="50">
            </div>
            <div class="margin-item">
                <span class="margin-label">左右</span>
                <input type="number" id="marginSides" value="10" min="0" max="50">
            </div>
        </div>
        
        <label>页眉页脚:</label>
        <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" id="showHeader" checked> 显示页眉</label>
            <label class="checkbox-item"><input type="checkbox" id="showFooter" checked> 显示页脚</label>
        </div>
        
        <hr>
        
        <button onclick="window.print()">打印 / 导出 PDF</button>
    </div>

    <div id="content">
        <div class="loading">请从下拉列表选择试卷或输入试卷 Token 后点击"加载试卷"</div>
    </div>

    <script>
        let currentQuestions = [];
        let currentPaperTitle = '试卷';
        let allowAnalysis = false;

        // 页面加载时检查 URL 参数
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (token) {
                // 有加密参数，使用新的加载方式
                document.getElementById('manualInputSection').style.display = 'none';
                document.getElementById('encryptedLinkInfo').style.display = 'block';
                loadPaperWithToken(token);
            }
        });

        // 使用加密令牌加载试卷
        async function loadPaperWithToken(token) {
            const container = document.getElementById('content');
            container.innerHTML = '<div class="loading">验证打印链接并加载试卷...</div>';

            try {
                const response = await fetch(`/api/math/verify-print-link?token=${encodeURIComponent(token)}`);
                const result = await response.json();
                
                if (result.code !== 0 || !result.data) {
                    throw new Error(result.message || '打印链接无效或已过期');
                }
                
                const data = result.data;
                currentQuestions = data.questions || [];
                currentPaperTitle = data.paper?.Title || '试卷';
                allowAnalysis = data.allowAnalysis || false;
                
                // 如果允许打印解析，显示解析选项
                if (allowAnalysis) {
                    document.getElementById('showAnalysisLabel').style.display = 'flex';
                    document.getElementById('showAnalysis').checked = true;
                }
                
                // 应用设置并渲染
                applySettings();
            } catch (error) {
                container.innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
            }
        }

        // 加载试卷内容（使用 Token 直接加载）
        async function loadPaper() {
            const paperToken = document.getElementById('paperToken').value.trim();
            
            if (!paperToken) {
                alert('请输入试卷 Token');
                return;
            }

            const container = document.getElementById('content');
            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                // 使用现有的打印页面 API 获取试卷数据
                const response = await fetch(`/api/math/smart-paper/${paperToken}/print`);
                if (!response.ok) {
                    throw new Error('试卷不存在或链接已失效');
                }
                
                const html = await response.text();
                
                // 提取题目数据
                const questionsMatch = html.match(/const QUESTIONS = (\[.*?\]);/s);
                const titleMatch = html.match(/const PAPER_TITLE = "(.*?)";/);
                
                if (questionsMatch && titleMatch) {
                    currentQuestions = JSON.parse(questionsMatch[1]);
                    currentPaperTitle = titleMatch[1];
                    
                    // 应用设置并渲染
                    applySettings();
                } else {
                    throw new Error('无法解析试卷数据');
                }
            } catch (error) {
                container.innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
            }
        }

        // 转换文本（处理图片、公式等）
        function transformText(text) {
            if (!text) return '';

            let content = text.trim()
                .replace(/＄/g, '$')
                .replace(/\.\$png/g, '.png')
                .replace(/\\r\\n/g, '\n')
                .replace(/\\n/g, '\n');

            // 将 \\( 和 \\) 转换为 \( 和 \)，以便 KaTeX 识别
            content = content.replace(/\\\\\(/g, '\\(').replace(/\\\\\)/g, '\\)');
            content = content.replace(/\\\\\[/g, '\\[').replace(/\\\\\]/g, '\\]');

            // 先处理非 LaTeX 部分，保留 LaTeX 公式不变
            // 使用占位符保护 LaTeX 公式
            const latexBlocks = [];

            // 保护 $$...$$ 块级公式
            content = content.replace(/\$\$[\s\S]*?\$\$/g, (match) => {
                latexBlocks.push(match);
                return `__LATEX_BLOCK_${latexBlocks.length - 1}__`;
            });

            // 保护 $...$ 行内公式
            content = content.replace(/\$[^\$]+\$/g, (match) => {
                latexBlocks.push(match);
                return `__LATEX_INLINE_${latexBlocks.length - 1}__`;
            });

            // 保护 \(...\) 行内公式
            content = content.replace(/\\\([\s\S]*?\\\)/g, (match) => {
                latexBlocks.push(match);
                return `__LATEX_PAREN_${latexBlocks.length - 1}__`;
            });

            // 保护 \[...\] 块级公式
            content = content.replace(/\\\[[\s\S]*?\\\]/g, (match) => {
                latexBlocks.push(match);
                return `__LATEX_BRACKET_${latexBlocks.length - 1}__`;
            });

            // 先处理 Markdown 图片语法 ![alt](url)
            content = content.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function(match, alt, url) {
                // 去除 _yjs 等后缀
                let cleanUrl = url.replace(/(_yjs|_thumb|_small|_medium|_large)(\?.*)?$/i, '$2');
                return '<div style="width:50%;"><img src="' + cleanUrl + '" style="max-width:100%;height:auto;display:block;margin:5px 0;" alt="' + alt + '" /></div>';
            });

            // 处理独立的图片 URL（排除已经处理过的图片标签）
            content = content.replace(/(https?:\/\/[^\s<>"]+?\.(?:png|jpg|jpeg|gif|webp))(?:_[a-zA-Z0-9]+)?(?![^<]*>)/gi, function(match, url) {
                // 检查是否已经在 img 标签中
                if (match.includes('<img')) return match;
                return '<div style="width:50%;"><img src="' + url + '" style="max-width:100%;height:auto;display:block;margin:5px 0;" alt="题目图片" /></div>';
            });

            // 处理自定义标签《答案》《分析》《注释》等
            // 标签样式 - 简洁样式
            const answerLabelStyle = 'color:#fff;background-color:#009688;padding:1px 6px;margin-right:6px;border-radius:4px;font-size:12px;';
            const analysisLabelStyle = 'color:#fff;background-color:#009688;padding:1px 6px;margin-right:6px;border-radius:4px;font-size:12px;';
            const stepLabelStyle = 'color:#fff;background-color:#E91E63;padding:1px 6px;margin-right:6px;border-radius:4px;font-size:12px;';
            const commentLabelStyle = 'color:#fff;background-color:#00BCD4;padding:1px 6px;margin-right:6px;border-radius:4px;font-size:12px;';

            // 处理 《答案》【答案】《/答案》
            content = content.replace(/《答案》\s*【答案】\s*《\/答案》/g, `<span style="${answerLabelStyle}">答案</span>`);
            // 处理 《答案》【证明】《/答案》
            content = content.replace(/《答案》\s*【证明】\s*《\/答案》/g, `<span style="${answerLabelStyle}">证明</span>`);
            // 处理 《答案》【解析】《/答案》
            content = content.replace(/《答案》\s*【解析】\s*《\/答案》/g, `<span style="${answerLabelStyle}">答案</span>`);
            // 处理 《答案》...《/答案》
            content = content.replace(/《答案》([\s\S]*?)《\/答案》/g, '<span style="' + answerLabelStyle + '">答案</span>$1');

            // 处理 《分析》【解析】《/分析》- 标签+青色内容
            content = content.replace(/《分析》\s*【解析】\s*《\/分析》/g, `<span style="${analysisLabelStyle}">解析</span>`);
            // 处理 《分析》【思路分析】《/分析》- 标签+青色内容
            content = content.replace(/《分析》\s*【思路分析】\s*《\/分析》/g, `<span style="${analysisLabelStyle}">思路分析</span>`);
            // 处理 《分析》...《/分析》- 标签+青色内容
            content = content.replace(/《分析》([\s\S]*?)《\/分析》/g, '<span style="' + analysisLabelStyle + '">分析</span><span style="color:#009688;">$1</span>');

            // 处理 《注释》...《/注释》- 只改变字体颜色为青色(#009688)，不加换行
            content = content.replace(/《注释》([\s\S]*?)《\/注释》/g, '<span style="color:#009688;">$1</span>');

            // 处理 《步骤》...《/步骤》- 橙色加粗，不需要标签
            content = content.replace(/《步骤》([\s\S]*?)《\/步骤》/g, '<span style="color:#FF9800;font-weight:bold;">$1</span>');

            // 处理 《点评》...《/点评》- 直接删除不显示
            content = content.replace(/《点评》[\s\S]*?《\/点评》/g, '');

            // 处理 【欧几里得...】相关内容 - 直接删除不显示
            content = content.replace(/【欧几里得[^】]*?】/g, '');

            // 处理 【命题人...】相关内容 - 直接删除不显示
            content = content.replace(/【命题人[^】]*?】/g, '');

            // 处理 Markdown 标题
            content = content.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            content = content.replace(/^## (.+)$/gm, '<h3>$1</h3>');
            content = content.replace(/^# (.+)$/gm, '<h3>$1</h3>');

            // 处理代码块
            content = content.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            content = content.replace(/`([^`]+)`/g, '<code>$1</code>');

            // 处理粗体和斜体
            content = content.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            content = content.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // 处理换行
            content = content.replace(/\n/g, '<br/>');

            // 恢复 LaTeX 公式
            content = content.replace(/__LATEX_BLOCK_(\d+)__/g, (match, index) => latexBlocks[index]);
            content = content.replace(/__LATEX_INLINE_(\d+)__/g, (match, index) => latexBlocks[index]);
            content = content.replace(/__LATEX_PAREN_(\d+)__/g, (match, index) => latexBlocks[index]);
            content = content.replace(/__LATEX_BRACKET_(\d+)__/g, (match, index) => latexBlocks[index]);

            return content;
        }

        // 应用自定义设置并渲染
        function applySettings() {
            const qPerPage = parseInt(document.getElementById('questionsPerPage').value) || 0;
            const spacing = parseInt(document.getElementById('spacing').value) || 8;
            const fontSize = parseInt(document.getElementById('fontSize').value) || 11;
            const settings = getSettings();
            
            const root = document.documentElement;
            root.style.setProperty('--q-spacing-between', spacing + 'mm');
            root.style.setProperty('--q-label-fontsize', fontSize + 'pt');
            root.style.setProperty('--q-content-fontsize', fontSize + 'pt');
            root.style.setProperty('--page-margin-top', settings.marginTop + 'mm');
            root.style.setProperty('--page-margin-bottom', settings.marginBottom + 'mm');
            root.style.setProperty('--page-margin-sides', settings.marginSides + 'mm');
            
            // 更新打印页边距和页码样式
            updatePrintStyles(settings);
            
            // 渲染试卷
            renderPaper(qPerPage);
        }

        // 更新打印样式
        function updatePrintStyles(settings) {
            // 移除旧的动态样式表
            const oldStyle = document.getElementById('dynamic-print-styles');
            if (oldStyle) {
                oldStyle.remove();
            }
            
            // 创建新的样式表
            const style = document.createElement('style');
            style.id = 'dynamic-print-styles';
            
            const footerRule = settings.showFooter 
                ? `@bottom-center { content: "第 " counter(page) " 页"; font-size: 10pt; color: #666; }`
                : '';
            
            const headerRule = settings.showHeader
                ? `@top-center { content: "研大师刷研题"; font-size: 10pt; color: #999; }`
                : '';
            
            style.textContent = `
                @media print {
                    @page { 
                        size: A4; 
                        margin: ${settings.marginTop}mm ${settings.marginSides}mm ${settings.marginBottom}mm ${settings.marginSides}mm;
                        ${headerRule}
                        ${footerRule}
                    }
                    
                    /* 水印样式 */
                    .printable-page::before {
                        content: "研大师刷研题";
                        position: fixed;
                        top: 50%;
                        left: 50%;
                        transform: translate(-50%, -50%) rotate(-45deg);
                        font-size: 60pt;
                        color: rgba(200, 200, 200, 0.15);
                        font-weight: bold;
                        pointer-events: none;
                        z-index: 1000;
                        white-space: nowrap;
                    }
                }
            `;
            
            document.head.appendChild(style);
        }

        // 获取设置
        function getSettings() {
            return {
                displayMode: document.getElementById('questionDisplayMode').value,
                showSource: document.getElementById('showSource').checked,
                showId: document.getElementById('showId').checked,
                showAnalysis: document.getElementById('showAnalysis').checked,
                marginTop: parseInt(document.getElementById('marginTop').value) || 15,
                marginBottom: parseInt(document.getElementById('marginBottom').value) || 15,
                marginSides: parseInt(document.getElementById('marginSides').value) || 20,
                showHeader: document.getElementById('showHeader').checked,
                showFooter: document.getElementById('showFooter').checked
            };
        }

        // 渲染试卷
        function renderPaper(qPerPage) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            
            if (!currentQuestions || currentQuestions.length === 0) {
                container.innerHTML = '<div class="empty">该试卷暂无题目</div>';
                return;
            }

            const settings = getSettings();

            // 按题型分组
            const groups = {};
            const typeOrder = [];
            currentQuestions.forEach(q => {
                const type = q.QuestionType || '其他题型';
                if (!groups[type]) {
                    groups[type] = [];
                    typeOrder.push(type);
                }
                groups[type].push(q);
            });

            const chineseNums = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
            
            let currentPage = createPage(1);
            container.appendChild(currentPage);
            let questionsInPage = 0;
            let pageNum = 1;
            let globalIndex = 1;
            
            typeOrder.forEach((type, typeIndex) => {
                let headerAdded = false;
                
                groups[type].forEach(q => {
                    // 检查是否需要新页面
                    if (qPerPage > 0 && questionsInPage >= qPerPage && questionsInPage > 0) {
                        pageNum++;
                        currentPage = createPage(pageNum);
                        container.appendChild(currentPage);
                        questionsInPage = 0;
                        headerAdded = false;
                    }
                    
                    // 添加题型标题（只在第一页显示）
                    if (!headerAdded && pageNum === 1) {
                        const sectionHeader = document.createElement('div');
                        sectionHeader.className = 'section-header';
                        sectionHeader.textContent = `${chineseNums[typeIndex] || (typeIndex + 1)}、${type}`;
                        currentPage.querySelector('.questions-list').appendChild(sectionHeader);
                        headerAdded = true;
                    }
                    
                    // 创建题目容器（题号+题目+解析作为一个整体）
                    const qItem = document.createElement('div');
                    qItem.className = 'question-item';
                    
                    // 题目标题
                    const qHeader = document.createElement('div');
                    qHeader.className = 'question-header';
                    let headerText = `${globalIndex}.`;
                    
                    // 显示ID
                    if (settings.showId && q.QuestionID) {
                        headerText += ` [ID:${q.QuestionID}]`;
                    }
                    
                    // 显示来源
                    if (settings.showSource && (q.BookTitle || q.BookChapter)) {
                        const source = [q.BookTitle, q.BookChapter].filter(Boolean).join(' - ');
                        if (source) {
                            headerText += ` (${source})`;
                        }
                    }
                    
                    qHeader.textContent = headerText;
                    qItem.appendChild(qHeader);
                    
                    // 题目内容
                    const displayMode = settings.displayMode;
                    const hasQuestionImg = q.QuestionImg && q.QuestionImg.trim();
                    const hasQuestionText = q.QuestionText && q.QuestionText.trim();
                    
                    if (displayMode === 'auto') {
                        // 自动选择：优先题图
                        if (hasQuestionImg) {
                            const qImg = document.createElement('div');
                            qImg.className = 'question-image';
                            qImg.innerHTML = transformText(q.QuestionImg);
                            qItem.appendChild(qImg);
                        } else if (hasQuestionText) {
                            const qBody = document.createElement('div');
                            qBody.className = 'question-body';
                            qBody.innerHTML = transformText(q.QuestionText);
                            qItem.appendChild(qBody);
                        }
                    } else if (displayMode === 'text') {
                        // 仅题目文本
                        if (hasQuestionText) {
                            const qBody = document.createElement('div');
                            qBody.className = 'question-body';
                            qBody.innerHTML = transformText(q.QuestionText);
                            qItem.appendChild(qBody);
                        }
                    } else if (displayMode === 'image') {
                        // 仅题图
                        if (hasQuestionImg) {
                            const qImg = document.createElement('div');
                            qImg.className = 'question-image';
                            qImg.innerHTML = transformText(q.QuestionImg);
                            qItem.appendChild(qImg);
                        }
                    }
                    
                    // 解析（根据设置决定是否显示）
                    // 优先使用 math_questiondetails 表的解析内容
                    if (settings.showAnalysis) {
                        let analysisContent = '';
                        
                        // 使用 math_questiondetails 表的解析内容
                        if (q.analysisDetails && q.analysisDetails.length > 0) {
                            analysisContent = q.analysisDetails.map(detail => {
                                // 一题多解显示标签，题目详解不显示标签
                                const typeLabel = detail.type === '一题多解' ? '<div style="color:#28a745;margin-bottom:4px;font-weight:bold;">【一题多解】</div>' : '';
                                return `<div style="margin-bottom:8px;">${typeLabel}${transformText(detail.content)}</div>`;
                            }).join('');
                        }
                        // 如果没有详细解析，回退到 OriginalAnswerText
                        else if (q.OriginalAnswerText && q.OriginalAnswerText.trim()) {
                            analysisContent = transformText(q.OriginalAnswerText);
                        }
                        
                        if (analysisContent) {
                            // 再次过滤【欧几里得...】和【命题人...】相关内容
                            analysisContent = analysisContent.replace(/【欧几里得[^】]*?】/g, '');
                            analysisContent = analysisContent.replace(/【命题人[^】]*?】/g, '');
                            const analysisDiv = document.createElement('div');
                            analysisDiv.className = 'question-analysis';
                            analysisDiv.innerHTML = `
                                <div class="question-analysis-header" style="font-weight:bold;">解析</div>
                                <div class="question-analysis-content">${analysisContent}</div>
                            `;
                            qItem.appendChild(analysisDiv);
                        }
                    }
                    
                    currentPage.querySelector('.questions-list').appendChild(qItem);
                    questionsInPage++;
                    globalIndex++;
                });
            });
            
            // 渲染 KaTeX
            setTimeout(renderMath, 100);
        }

        // 创建页面
        function createPage(num) {
            const settings = getSettings();
            const page = document.createElement('div');
            page.className = 'printable-page';
            page.style.paddingTop = settings.marginTop + 'mm';
            page.style.paddingBottom = settings.marginBottom + 'mm';
            page.style.paddingLeft = settings.marginSides + 'mm';
            page.style.paddingRight = settings.marginSides + 'mm';
            
            let headerHtml = '';
            if (settings.showHeader) {
                headerHtml = `
                    <div class="paper-header">
                        <div class="paper-title">${currentPaperTitle}</div>
                    </div>
                `;
            }
            
            // 页码使用 CSS @page 规则在打印时自动添加
            // 预览时显示页码
            let footerHtml = '';
            if (settings.showFooter) {
                footerHtml = `
                    <div class="paper-footer no-print" style="text-align: center; font-size: 10pt; color: #666; margin-top: 10mm; padding-top: 5mm; border-top: 1px solid #eee;">
                        第 ${num} 页
                    </div>
                `;
            }
            
            page.innerHTML = headerHtml + '<div class="questions-list"></div>' + footerHtml;
            return page;
        }

        // 渲染 KaTeX
        function renderMath() {
            if (typeof renderMathInElement === 'function') {
                try {
                    // 先检查是否有未渲染的公式
                    document.querySelectorAll('.question-analysis-content, .question-body').forEach(el => {
                        let text = el.innerHTML;
                        console.log('原始内容:', text);
                        
                        // 将 HTML 实体转义的反斜杠还原
                        text = text.replace(/&amp;/g, '\\');
                        
                        // 检查是否有 aligned 环境
                        const hasAligned = text.includes('begin{aligned') || text.includes('\\begin{aligned');
                        
                        if (hasAligned) {
                            console.log('发现 aligned 环境');
                        }
                        
                        // 如果内容包含 aligned 但没有被 $$ 包裹，手动添加
                        if (hasAligned && !text.includes('$$')) {
                            text = text.replace(/\\begin{aligned}/g, '$$ $$\\begin{aligned}');
                            text = text.replace(/\\end{aligned}/g, '\\end{aligned} $$ ');
                        }
                        
                        el.innerHTML = text;
                        console.log('修改后内容:', text);
                    });
                    
                    // 渲染所有数学公式
                    renderMathInElement(document.body, {
                        delimiters: [
                            {left: "$$", right: "$$", display: true},
                            {left: "$", right: "$", display: false},
                            {left: "\\[", right: "\\]", display: true},
                            {left: "\\(", right: "\\)", display: false}
                        ],
                        throwOnError: false,
                        trust: true,
                        strict: false
                    });
                } catch (e) {
                    console.error('KaTeX 渲染错误:', e);
                }
            }
        }

        // 页面加载时获取试卷列表
        window.onload = function() {
            // 初始化打印样式
            updatePrintStyles(getSettings());
            
            // 添加设置变更监听器
            document.getElementById('questionDisplayMode').addEventListener('change', applySettings);
            document.getElementById('showSource').addEventListener('change', applySettings);
            document.getElementById('showId').addEventListener('change', applySettings);
            document.getElementById('showAnalysis').addEventListener('change', applySettings);
            document.getElementById('questionsPerPage').addEventListener('change', applySettings);
            document.getElementById('spacing').addEventListener('change', applySettings);
            document.getElementById('fontSize').addEventListener('change', applySettings);
            document.getElementById('marginTop').addEventListener('change', applySettings);
            document.getElementById('marginBottom').addEventListener('change', applySettings);
            document.getElementById('marginSides').addEventListener('change', applySettings);
            document.getElementById('showHeader').addEventListener('change', applySettings);
            document.getElementById('showFooter').addEventListener('change', applySettings);
        };
    </script>
</body>
</html>
